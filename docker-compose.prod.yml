# =============================================================================
# docker-compose.prod.yml — PRODUÇÃO
# Usage: docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - prod_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
    expose:
      - "6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - prod_internal

  web:
    build:
      context: .
      target: prod
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - media_prod:/app/media
      - static_prod:/app/staticfiles
    env_file: .envs/.env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      RUN_MIGRATIONS: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - prod_internal
      - prod_external

  celery:
    build:
      context: .
      target: prod
    restart: unless-stopped
    command: >
      celery -A config worker
      -l info
      -Q default,celery
      --concurrency=4
      --max-tasks-per-child=100
    volumes:
      - media_prod:/app/media
    env_file: .envs/.env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - prod_internal

  celery-beat:
    build:
      context: .
      target: prod
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .envs/.env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks:
      - prod_internal

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/snippets:/etc/nginx/snippets:ro
      - static_prod:/app/staticfiles:ro
      - media_prod:/app/media:ro
      - nginx_prod_logs:/var/log/nginx
      # Mount your SSL certs here (e.g. from Certbot/Let's Encrypt):
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - prod_external

volumes:
  postgres_prod_data:
  redis_prod_data:
  media_prod:
  static_prod:
  nginx_prod_logs:

networks:
  prod_internal:
    driver: bridge
    internal: true
  prod_external:
    driver: bridge
