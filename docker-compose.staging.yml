# =============================================================================
# docker-compose.staging.yml — HOMOLOGAÇÃO (STAGING)
# Usage: docker compose -f docker-compose.staging.yml up -d
# =============================================================================

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - staging_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - staging_internal

  web:
    build:
      context: .
      target: prod
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - media_staging:/app/media
      - static_staging:/app/staticfiles
    env_file: .envs/.env.staging
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      RUN_MIGRATIONS: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - staging_internal
      - staging_external

  celery:
    build:
      context: .
      target: prod
    restart: unless-stopped
    command: celery -A config worker -l info -Q default,celery --concurrency=2
    volumes:
      - media_staging:/app/media
    env_file: .envs/.env.staging
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - staging_internal

  celery-beat:
    build:
      context: .
      target: prod
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .envs/.env.staging
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - staging_internal

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - static_staging:/app/staticfiles:ro
      - media_staging:/app/media:ro
      - nginx_staging_logs:/var/log/nginx
    depends_on:
      - web
    networks:
      - staging_external

volumes:
  postgres_staging_data:
  redis_staging_data:
  media_staging:
  static_staging:
  nginx_staging_logs:

networks:
  staging_internal:
    driver: bridge
    internal: true
  staging_external:
    driver: bridge
