# =============================================================================
# Nginx — PRODUÇÃO   HTTPS + HTTP→HTTPS redirect + SSL Termination
# Certbot/Let's Encrypt paths — substitua YOUR_DOMAIN pelo domínio real
# =============================================================================

upstream django_prod {
    server web:8000;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone  $binary_remote_addr zone=auth_prod:20m   rate=5r/m;
limit_req_zone  $binary_remote_addr zone=api_prod:20m    rate=120r/m;
limit_conn_zone $binary_remote_addr zone=conn_prod:20m;

# Gzip
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/javascript
           text/xml application/xml application/xml+rss text/javascript;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    charset utf-8;
    client_max_body_size 20M;

    # SSL — Let's Encrypt (Certbot)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    # SSL hardening
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache         shared:SSL:20m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout          5s;

    # Security headers (snippets/security-headers.conf)
    include /etc/nginx/snippets/security-headers.conf;

    # Logging
    access_log /var/log/nginx/prod_access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/prod_error.log  warn;

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Auth endpoints — strict rate limit
    location ~ ^/api/v1/auth/(token|register|logout) {
        limit_req  zone=auth_prod burst=5 nodelay;
        limit_conn conn_prod 10;
        proxy_pass         http://django_prod;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 30s;
    }

    # API
    location /api/ {
        limit_req  zone=api_prod burst=60 nodelay;
        limit_conn conn_prod 30;
        proxy_pass         http://django_prod;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 60s;
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }

    # Django admin (restrict to trusted IPs in prod)
    location /django-admin/ {
        # Uncomment and set your admin IP:
        # allow YOUR_ADMIN_IP;
        # deny all;
        proxy_pass         http://django_prod;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # Health check (no log, no auth)
    location /health/ {
        proxy_pass http://django_prod;
        access_log off;
        proxy_set_header Host $host;
    }

    location / {
        return 404;
    }
}
