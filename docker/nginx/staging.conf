# =============================================================================
# Nginx — STAGING (Homologação)  HTTP only, proxy to gunicorn
# =============================================================================

upstream django_staging {
    server web:8000;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth_staging:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_staging:10m  rate=60r/m;
limit_conn_zone $binary_remote_addr zone=conn_staging:10m;

server {
    listen 80;
    server_name _;

    charset utf-8;
    client_max_body_size 20M;

    # Security headers (relaxed for staging — no HSTS)
    add_header X-Frame-Options          "DENY"    always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-Environment            "staging" always;

    # Logging
    access_log /var/log/nginx/staging_access.log combined;
    error_log  /var/log/nginx/staging_error.log  warn;

    # Static & media
    location /static/ {
        alias /app/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # Auth — rate limited
    location ~ ^/api/v1/auth/(token|register|logout) {
        limit_req zone=auth_staging burst=10 nodelay;
        limit_conn conn_staging 10;
        proxy_pass         http://django_staging;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # API
    location /api/ {
        limit_req  zone=api_staging burst=30 nodelay;
        limit_conn conn_staging 20;
        proxy_pass         http://django_staging;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 60s;
    }

    # Django admin
    location /django-admin/ {
        proxy_pass         http://django_staging;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # Health check
    location /health/ {
        proxy_pass http://django_staging;
        access_log off;
    }

    location / {
        return 404;
    }
}
