# PostgreSQL Configuration for Low Memory (256MB allocated)
# Place this file in: /etc/postgresql/14/main/conf.d/tickettche-optimization.conf
# Or append to: /etc/postgresql/14/main/postgresql.conf

# =============================================================================
# MEMORY CONFIGURATION (256MB allocated to PostgreSQL)
# =============================================================================

# Shared Buffers - RAM for caching data
# Rule: 25% of allocated RAM
shared_buffers = 64MB

# Effective Cache Size - Hint to query planner about available OS cache
# Rule: 75% of allocated RAM
effective_cache_size = 192MB

# Work Memory - RAM per operation (sort, hash join)
# CRITICAL: This is PER OPERATION! Keep low to avoid OOM
# With max_connections=30, total work_mem usage could be: 2MB × 30 = 60MB
work_mem = 2MB

# Maintenance Work Memory - RAM for VACUUM, CREATE INDEX, etc.
maintenance_work_mem = 16MB

# =============================================================================
# CONNECTION SETTINGS
# =============================================================================

# Max Connections - Reduce from default 100
# Each connection uses ~10MB RAM, so 30 × 10MB = 300MB total
max_connections = 30

# =============================================================================
# WRITE-AHEAD LOG (WAL)
# =============================================================================

wal_buffers = 2MB
checkpoint_completion_target = 0.9

# =============================================================================
# QUERY PLANNER
# =============================================================================

# SSD optimization
random_page_cost = 1.1  # Default is 4.0 for HDD, 1.1 for SSD
effective_io_concurrency = 200  # SSD can handle many concurrent requests

# =============================================================================
# LOGGING (Only slow queries to identify performance issues)
# =============================================================================

# Log queries that take longer than 1 second
log_min_duration_statement = 1000  # milliseconds

# Log format
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# Log checkpoints (useful for monitoring)
log_checkpoints = on

# Don't log connections/disconnections in production (saves resources)
log_connections = off
log_disconnections = off

# Log lock waits (helps debug deadlocks)
log_lock_waits = on
deadlock_timeout = 1s

# =============================================================================
# AUTOVACUUM (Keep database healthy)
# =============================================================================

autovacuum = on
autovacuum_max_workers = 2  # Reduced from default 3
autovacuum_naptime = 1min

# =============================================================================
# CLIENT CONNECTION DEFAULTS
# =============================================================================

# Statement timeout - Kill queries running longer than 30 seconds
# Prevents runaway queries from consuming memory
statement_timeout = 30000  # milliseconds (30s)

# Idle in transaction timeout - Kill idle transactions after 10 minutes
idle_in_transaction_session_timeout = 600000  # milliseconds (10min)

# =============================================================================
# LOCALE AND FORMATTING
# =============================================================================

lc_messages = 'en_US.UTF-8'
lc_monetary = 'pt_BR.UTF-8'
lc_numeric = 'pt_BR.UTF-8'
lc_time = 'pt_BR.UTF-8'

timezone = 'America/Sao_Paulo'

# =============================================================================
# NOTES
# =============================================================================
# After changing these settings:
# 1. Test config: sudo -u postgres /usr/lib/postgresql/14/bin/postgres -D /var/lib/postgresql/14/main --config-file=/etc/postgresql/14/main/postgresql.conf -C shared_buffers
# 2. Restart PostgreSQL: sudo systemctl restart postgresql
# 3. Verify settings: psql -U tickettche -d tickettche -c "SHOW shared_buffers;"
# 4. Monitor memory: watch -n 1 'free -h && echo "---" && ps aux --sort=-%mem | head -n 10'
