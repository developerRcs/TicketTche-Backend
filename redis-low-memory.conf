# Redis Configuration for Low Memory (128MB allocated)
# Place this file in: /etc/redis/redis-tickettche.conf
# Or append to: /etc/redis/redis.conf

# =============================================================================
# MEMORY CONFIGURATION
# =============================================================================

# Maximum memory limit
maxmemory 128mb

# Eviction policy when max memory is reached
# allkeys-lru: Remove least recently used keys (best for cache)
maxmemory-policy allkeys-lru

# =============================================================================
# PERSISTENCE (Disabled for cache-only usage)
# =============================================================================

# Disable RDB snapshots (saves RAM and disk I/O)
save ""

# Disable AOF (Append Only File)
appendonly no

# Note: If you need persistence, use minimal settings:
# save 900 1      # Save after 900 sec if at least 1 key changed
# save 300 10     # Save after 300 sec if at least 10 keys changed
# save 60 10000   # Save after 60 sec if at least 10000 keys changed

# =============================================================================
# DATA STRUCTURE OPTIMIZATION
# =============================================================================

# Optimize hashes (reduce memory usage)
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# Optimize lists
list-max-ziplist-size -2

# Optimize sets
set-max-intset-entries 512

# Optimize sorted sets
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# =============================================================================
# NETWORK
# =============================================================================

# Binding
bind 127.0.0.1

# Port
port 6379

# Close connection after client is idle for N seconds (0 = disabled)
timeout 300

# TCP keepalive
tcp-keepalive 60

# Max clients
maxclients 100

# =============================================================================
# LOGGING
# =============================================================================

# Log level: debug, verbose, notice, warning
loglevel warning

# Log file
logfile /var/log/redis/redis-server.log

# =============================================================================
# SLOW LOG (Identify slow operations)
# =============================================================================

# Log operations slower than 10 milliseconds
slowlog-log-slower-than 10000

# Keep last 128 slow operations in memory
slowlog-max-len 128

# =============================================================================
# ADVANCED CONFIG
# =============================================================================

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""

# Active defragmentation (Redis 4.0+)
# Helps reduce memory fragmentation
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 5
active-defrag-cycle-max 75

# =============================================================================
# NOTES
# =============================================================================
# After changing these settings:
# 1. Test config: redis-server /path/to/redis-tickettche.conf --test-memory 128
# 2. Restart Redis: sudo systemctl restart redis
# 3. Verify settings: redis-cli CONFIG GET maxmemory
# 4. Monitor memory: redis-cli INFO memory
# 5. Check slow log: redis-cli SLOWLOG GET 10
