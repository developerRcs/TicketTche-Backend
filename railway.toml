# railway.toml — TicketTchê Backend
# Deploy automático via Railway (https://railway.app)

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
dockerBuildTarget = "prod"

[deploy]
startCommand = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --worker-class gthread --threads 2 --timeout 60 --log-level info --access-logfile - --error-logfile -"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

healthcheckPath = "/health/"
healthcheckTimeout = 30
